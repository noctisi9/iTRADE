name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.noctisi9.itrade",
            "appName": "iTRADE",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          CAPEOF

      - name: Add Android & sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK (capture output)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-error-log
          path: /tmp/gradle-output.txt
          retention-days: 7

      - name: Upload APK on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iTRADE-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
