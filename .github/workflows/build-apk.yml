name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold Android platform files
        run: flutter create --platforms=android --org com.noctis.itrade .

      - name: Remove default test stub
        run: rm -rf test

      - name: Show generated manifest (debug aid)
        run: cat android/app/src/main/AndroidManifest.xml

      - name: Show generated build.gradle files (debug aid)
        run: |
          echo "=== android/app/ contents ===" && ls android/app/
          [ -f android/app/build.gradle ]     && echo "--- build.gradle ---"     && cat android/app/build.gradle     || true
          [ -f android/app/build.gradle.kts ] && echo "--- build.gradle.kts ---" && cat android/app/build.gradle.kts || true

      - name: Inject permissions + app label
        run: |
          python3 - <<'PY'
          import re
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()
          if "android.permission.INTERNET" not in content:
              content = re.sub(r"(<manifest[^>]*>)",
                  r'\1\n    <uses-permission android:name="android.permission.INTERNET" />',
                  content, count=1)
          if "android.permission.POST_NOTIFICATIONS" not in content:
              content = re.sub(r"(<manifest[^>]*>)",
                  r'\1\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
                  content, count=1)
          content = re.sub(r'android:label="[^"]*"', 'android:label="NOCTIS iTRADE"', content, count=1)
          with open(path, "w") as f:
              f.write(content)
          assert "android.permission.INTERNET" in content
          assert "android.permission.POST_NOTIFICATIONS" in content
          print("Manifest OK")
          PY

      - name: Bump compileSdk/targetSdk globally
        run: |
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36"  >> android/local.properties

      - name: Patch app build.gradle.kts — compileSdk + desugaring
        run: |
          python3 - <<'PY'
          import os, re, glob

          # Locate the file — newer Flutter stable generates .kts, older generates .gradle
          groovy = "android/app/build.gradle"
          kotlin = "android/app/build.gradle.kts"

          if os.path.exists(kotlin):
              path, is_kts = kotlin, True
          elif os.path.exists(groovy):
              path, is_kts = groovy, False
          else:
              files = list(glob.glob("android/app/**", recursive=True))
              raise FileNotFoundError(f"No build.gradle found. android/app/ has: {files}")

          with open(path) as f:
              content = f.read()

          original = content
          print(f"Patching {path}  (kts={is_kts})")

          # ── 1. Fix compileSdk line (template uses flutter.compileSdkVersion) ──
          # This is what causes the "unknown compileSdkVersion" error on some runners.
          content = content.replace(
              "compileSdk = flutter.compileSdkVersion",
              "compileSdk = 36"
          )

          if is_kts:
              # ── 2a. Inject isCoreLibraryDesugaringEnabled into compileOptions ──
              if "isCoreLibraryDesugaringEnabled" not in content:
                  content = re.sub(
                      r"(compileOptions\s*\{)([^}]*)(})",
                      r"\1\2    isCoreLibraryDesugaringEnabled = true\n    \3",
                      content, count=1, flags=re.DOTALL,
                  )

              # ── 2b. Add or extend dependencies block ──
              desugar_dep = 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
              if desugar_dep not in content:
                  if re.search(r"^\s*dependencies\s*\{", content, re.MULTILINE):
                      # Block exists — inject at start
                      content = re.sub(
                          r"(dependencies\s*\{)",
                          f"\\1\n    {desugar_dep}",
                          content, count=1,
                      )
                  else:
                      # No dependencies block — append one at end of file
                      content = content.rstrip() + f"\n\ndependencies {{\n    {desugar_dep}\n}}\n"

          else:
              # Groovy DSL
              if "coreLibraryDesugaringEnabled" not in content:
                  content = re.sub(
                      r"(compileOptions\s*\{)([^}]*)(})",
                      r"\1\2    coreLibraryDesugaringEnabled true\n    \3",
                      content, count=1, flags=re.DOTALL,
                  )
              desugar_dep = "coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'"
              if desugar_dep not in content:
                  if re.search(r"^\s*dependencies\s*\{", content, re.MULTILINE):
                      content = re.sub(
                          r"(dependencies\s*\{)",
                          f"\\1\n    {desugar_dep}",
                          content, count=1,
                      )
                  else:
                      content = content.rstrip() + f"\n\ndependencies {{\n    {desugar_dep}\n}}\n"

          print(f"Changed: {content != original}")
          print("=== Final content ===")
          print(content)

          with open(path, "w") as f:
              f.write(content)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Patch plugin compileSdk overrides
        run: |
          python3 - <<'PY'
          import glob, os

          home = os.path.expanduser("~")
          package_names = [
              "audioplayers_android",
              "share_plus",
              "flutter_local_notifications",
          ]
          candidates = []
          for pkg in package_names:
              candidates.extend(glob.glob(f"{home}/.pub-cache/hosted/pub.dev/{pkg}-*/android/build.gradle"))
              candidates.extend(glob.glob(f"{home}/.pub-cache/hosted/pub.dev/{pkg}-*/android/build.gradle.kts"))

          print("Found candidate files:", candidates)
          if not candidates:
              print("WARNING: no matching plugin Gradle files found.")

          for path in candidates:
              with open(path) as f:
                  original = f.read()
              content = original
              replacements = [
                  ("compileSdkVersion safeExtGet('compileSdkVersion', 33)", "compileSdkVersion 36"),
                  ('compileSdkVersion safeExtGet("compileSdkVersion", 33)', "compileSdkVersion 36"),
                  ("compileSdk = flutter.compileSdkVersion", "compileSdk = 36"),
                  ("compileSdkVersion flutter.compileSdkVersion", "compileSdkVersion 36"),
                  ("compileSdkVersion 33", "compileSdkVersion 36"),
                  ("compileSdk 33", "compileSdk 36"),
              ]
              for old, new in replacements:
                  content = content.replace(old, new)
              print(f"\n--- {path} (changed: {content != original}) ---")
              print(content)
              if content != original:
                  with open(path, "w") as f:
                      f.write(content)
          PY

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noctis-itrade-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
